<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
</head>

<body>
    <div id="sectionConferenceHome">
        <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/conference-img.png" class="image" />
        <div class="d-flex flex-row justify-content-center">
            <div class="text-container">
                <div class="space-container">
                    <h1 class="conference-heading">The Things Conference</h1>
                    <p class="conference-para">Redefining the future of IoT with LoRaWAN</p>
                    <button class="btn btn-primary" onclick="display('sectionConferenceDetails')">Known more</button>
                </div>
            </div>
        </div>
    </div>

    <div id="sectionConferenceDetails">
        <div class="embed-responsive embed-responsive-16by9">
            <iframe class="embed-responsive-item" src="https://www.youtube.com/embed/W_2hCKnzWj0?rel=0" allowfullscreen></iframe>
        </div>

        <div class="text-container2">
            <h1 class="details-heading">The things Conference</h1>
            <p class="details-para">Join Asias Largest conference on LoRaWAN</p>

            <div class="d-flex flex-row justify-content-center">
                <div class="score-container">
                    <p class="score">1400+</p>
                    <p class="score-para">Attendees</p>
                </div>
                <div class="score-container">
                    <p class="score">100+</p>
                    <p class="score-para">Workshops</p>
                </div>
            </div>
            <div class="d-flex flex-row justify-content-center">
                <div class="score-container">
                    <p class="score">120+</p>
                    <p class="score-para">Speakers</p>
                </div>
                <div class="score-container">
                    <p class="score">10+</p>
                    <p class="score-para">Countries</p>
                </div>
            </div>
            <button class="btn btn-primary" onclick="display('sectionConferenceHome')">Back</button>
        </div>
    </div>
    <script type="text/javascript" src="https://new-assets.ccbp.in/frontend/content/static-ccbp-ui-kit/static-ccbp-ui-kit.js"></script>

</html>
